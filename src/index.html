<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labb2-JS</title>
    <!-- CSS only -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="signin.html" />
    <link rel="stylesheet" href="signup.html" />
    <link rel="stylesheet" href="details.html" />
    <!-- FontAwesome -->
    <script
      src="https://kit.fontawesome.com/a317844617.js"
      crossorigin="anonymous"
    ></script>
    <script></script>
  </head>
  <body>
    <div class="container">
      <div class="row row-cols-1 row-cols-md-4 g-4" id="cards-container2">
        <!-- Cards will be injected here -->
      </div>
    </div>

    <div class="container-fluid bg-warning p-0">
      <div class="container mb-2 exxen-nav containers">
        <nav class="navbar navbar-expand-lg">
          <div class="container-fluid mt-3 mb-2">
            <div
              class="collapse navbar-collapse d-flex justify-content-end"
              id="navbarNavDropdown"
            >
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="signin.html">
                    <button class="uye-giris bg-warning">Sign In</button>
                  </a>
                </li>
                <li class="nav-item dropdown mt-2">
                  <a
                    class="nav-link dropdown-toggle"
                    href="#"
                    id="navbarDropdownMenuLink"
                    role="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    <i class="fa-solid fa-globe"></i>EN
                  </a>
                  <ul
                    class="dropdown-menu"
                    aria-labelledby="navbarDropdownMenuLink"
                  >
                    <li><a class="dropdown-item" href="#">English</a></li>
                    <li><a class="dropdown-item" href="#">Turkish</a></li>
                    <li><a class="dropdown-item" href="#">Espanol</a></li>
                  </ul>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>

      <div class="container-fluid uye-ol">
        <div class="container containers">
          <form action="">
            <div class="row kayit">
              <div class="col">
                <input type="text" placeholder="Name Surname" />
              </div>
              <div class="col">
                <input type="email" placeholder="E-mail" />
              </div>
              <div class="col">
                <a class="nav-link" href="signup.html">
                  <button type="button" class="bg-warning border-0">
                    Sign Up
                  </button>
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="container containers">
      <a href="">
        <img src="img/crad0.jpg" width="100%" class="mt-5" alt="" />
      </a>
    </div>

    <!-- Filmler -->
    <h1>Film Staden</h1>
    <div id="search-container">
      <input id="search-input" type="text" placeholder="Search for a movie..." />
      <button id="search-button">Search</button>
    </div>
    <ul id="movie-list"></ul>
    <div id="movie-card-container"></div>

      <!-- Ekan ve açıklamalar -->
      <div class="ekranlar text-center mt-5">
        <img src="img/ekranlar.svg" alt="" />
        <p class="fs-3 text-light mt-3">
          Sign up now and start watching from exxen.com, Google Play,
          AppGallery, App Store, Apple TV and Android TV on mobile, tablet,
          computer, anytime, anywhere.
        </p>

        <div class="d-flex m-auto resimler">
          <a href="">
            <img src="img/app-store-2.svg" alt="" />
          </a>
          <a href="">
            <img src="img/google-play@3x.png" alt="" />
          </a>
        </div>

        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-facebook"></i>
        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-youtube"></i>
        <i class="fa-brands fa-tiktok"></i>
      </div>
    </div>
    <script src="main.js"></script>
    <!-- Bootstrap Bundle JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
